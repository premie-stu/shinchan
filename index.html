<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PastelCafe - Mobile App</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 🎨 Color Palette จากภาพ */
            --c-yellow-light: #FED46E; /* เหลืองสว่าง (ใช้กับพื้นหลังไอคอน/ของตกแต่ง) */
            --c-yellow-dark: #FAC240;  /* เหลืองเข้ม (ใช้กับปุ่ม/ไอคอนเด่นๆ) */
            --c-purple-200: #ce93d8;   /* ม่วงอ่อน */
            --c-purple-300: #ba68c8;   /* ม่วงกลาง */
            --c-purple-400: #ab47bc;   /* ม่วงเข้ม (ใช้เป็น "สีตัวหนังสือหลัก" เพื่อให้อ่านง่าย) */
            
            /* Background & Text Fix */
            --bg-color: #FDF9FF;       
            --card-bg: #FFFFFF;        
            --text-heading: var(--c-purple-400); /* หัวข้อสีม่วงเข้ม */
            --text-sub: #8a6594;                 /* สีรายละเอียด (ม่วงตุ่นๆ ให้อ่านง่ายขึ้น) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        .app-container {
            width: 100%;
            max-width: 480px; 
            background-color: var(--bg-color);
            position: relative;
            height: 100%; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(171, 71, 188, 0.08);
            overflow: hidden; 
        }

        /* --- Header --- */
        header {
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; 
            z-index: 50;
            background: rgba(253, 249, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0; 
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--c-yellow-light); /* โลโก้พื้นเหลือง */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(254, 212, 110, 0.4);
            flex-shrink: 0;
            overflow: hidden;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-heading); /* เปลี่ยนเป็นสีม่วงเข้ม */
            flex-grow: 1;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .header-menu {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 40px;
            height: 40px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .header-menu svg {
            fill: var(--text-heading); /* เปลี่ยนเป็นสีม่วงเข้ม */
            width: 28px;
            height: 28px;
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 10px 24px 100px; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; 
        }

        .page {
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .page.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        a.card-link {
            text-decoration: none;
            display: block;
        }

        /* --- Portfolio Card (Home) --- */
        .portfolio-card {
            background-color: var(--card-bg);
            border-radius: 30px;
            padding: 12px;
            box-shadow: 0 8px 24px rgba(171, 71, 188, 0.12);
            margin-top: 10px;
        }

        .portfolio-img-wrapper {
            width: 100%;
            aspect-ratio: 2072 / 1292;
            border-radius: 20px;
            background-color: #fff9ea; /* พื้นหลังออกเหลืองนวลๆ */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--c-yellow-dark);
            color: var(--c-yellow-dark);
        }

        .portfolio-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; 
        }

        .portfolio-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 8px 8px 12px;
        }

        .portfolio-text h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-heading); /* เปลี่ยนเป็นสีม่วงเข้ม */
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .portfolio-text p {
            font-size: 0.9rem;
            color: var(--text-sub); /* ม่วงตุ่นๆ ให้อ่านง่าย */
            font-weight: 500; 
        }

        .portfolio-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--c-yellow-dark); /* ปุ่มสีเหลืองเด่นๆ */
            color: #FFFFFF;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(250, 194, 64, 0.3);
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .portfolio-btn:active {
            transform: scale(0.95);
        }

        .portfolio-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* --- Action Cards (ลิงก์เมนูต่างๆ) --- */
        .action-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(206, 147, 216, 0.15);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(206, 147, 216, 0.3);
            transition: transform 0.2s;
        }

        .action-card:active {
            transform: scale(0.98);
        }

        .action-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .action-icon-box {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background-color: var(--c-purple-200); 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
        }

        .action-icon-box svg {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        .action-text h4 {
            font-size: 1.05rem;
            color: var(--text-heading); /* ม่วงเข้ม */
            margin-bottom: 2px;
            font-weight: 700;
        }

        .action-text p {
            font-size: 0.85rem;
            color: var(--text-sub); /* ม่วงตุ่นๆ */
            font-weight: 500;
        }

        /* --- Sections for Group & Contact --- */
        .content-section {
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 1.15rem;
            color: var(--text-heading); /* ม่วงเข้ม */
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .section-title svg {
            fill: var(--c-yellow-dark); /* ไอคอนนำหน้าสีเหลือง */
            width: 22px;
            height: 22px;
        }

        /* --- Group Grid (รูป 1:1) --- */
        .group-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .group-img-wrapper {
            aspect-ratio: 1 / 1; 
            background-color: #faf2fc;
            border-radius: 16px;
            border: 2px dashed var(--c-purple-300);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--c-purple-300);
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .group-img-wrapper:active {
            transform: scale(0.95);
        }

        .group-img-wrapper svg {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            fill: currentColor;
        }
        
        .group-img-wrapper span {
            font-size: 0.85rem;
            color: var(--text-heading); /* ม่วงเข้ม */
            font-weight: 600;
        }

        /* --- Contact Grid --- */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .contact-btn {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 14px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(206, 147, 216, 0.15);
            text-decoration: none;
            gap: 8px;
            border: 1px solid rgba(206, 147, 216, 0.4);
            transition: transform 0.2s;
        }

        .contact-btn:active {
            transform: scale(0.95);
        }

        .contact-btn svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: var(--c-yellow-dark); /* ไอคอนสีเหลืองเข้ม */
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .contact-btn span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-heading); /* ม่วงเข้ม */
        }

        /* --- Rate Layout (Vertical Stack) --- */
        .rate-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px; 
            margin-top: 10px;
        }

        .gallery-img {
            width: 100%;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 18px rgba(171, 71, 188, 0.12);
            overflow: hidden;
            text-align: center;
        }

        .gallery-img.portrait {
            aspect-ratio: 3 / 4; 
            background-color: #faf2fc;
            color: var(--c-purple-300);
            border: 2px dashed var(--c-purple-300);
        }

        .gallery-img.square {
            aspect-ratio: 1 / 1; 
            background-color: #fff9ea;
            color: var(--c-yellow-dark);
            border: 2px dashed var(--c-yellow-dark);
        }

        .gallery-img strong {
            font-size: 1.15rem;
            color: var(--text-heading); /* ม่วงเข้ม */
            margin-top: 8px;
        }

        .gallery-img span {
            font-size: 0.9rem;
            color: var(--text-sub); /* ม่วงตุ่นๆ */
            font-weight: 500;
            margin-top: 4px;
        }

        .img-icon svg {
            width: 44px;
            height: 44px;
            fill: currentColor;
            opacity: 0.8;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: absolute; 
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px 20px; 
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -5px 25px rgba(171, 71, 188, 0.08);
            z-index: 100;
            border-top: 1px solid rgba(206, 147, 216, 0.2);
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--c-purple-300); /* ม่วงกลาง */
            cursor: pointer;
            width: 70px;
            transition: all 0.3s ease;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn span {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .nav-btn.active {
            color: var(--c-yellow-dark); /* เวลาเลือกแท็บ ให้สว่างเป็นสีเหลืองเด่นๆ */
        }

        .nav-btn.active svg {
            transform: translateY(-3px) scale(1.1);
        }
    </style>
</head>

    <script>
        function switchPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active');
            });

            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
            });

            setTimeout(() => {
                document.getElementById(pageId).classList.add('active');
                document.getElementById('btn-' + pageId).classList.add('active');
                
                document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
            }, 50);
        }
    </script>
